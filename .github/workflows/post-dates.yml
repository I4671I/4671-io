name: Add dates to new articles

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: post-dates
  cancel-in-progress: false

jobs:
  add-dates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Add missing article dates
        run: node scripts/add-post-dates.js

      - name: Commit generated article dates
        if: github.event_name == 'push'
        run: |
          git add content/posts
          if git diff --cached --quiet; then
            echo "No article dates to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          commit_date="$(TZ=Asia/Shanghai date +%F)"
          git commit -m "chore: add article dates ${commit_date}"
          git push
